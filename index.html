<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bowline — A calmer way through your day</title>
  <meta name="description" content="A daily support app for ADHD, autism, AuDHD, dyslexia, dyspraxia, executive dysfunction, and burnout." />
  <meta name="theme-color" content="#3F8F73" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32"   href="src/assets/bowline-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="src/assets/bowline-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180"      href="src/assets/bowline-icon.png" />

  <!-- Open Graph (social sharing) -->
  <meta property="og:title"       content="Bowline — A calmer way through your day" />
  <meta property="og:description" content="Daily support for neurodivergent users. Structure when you need it. Never trapped by it." />
  <meta property="og:image"       content="src/assets/bowline-lockup.png" />
  <meta property="og:type"        content="website" />

  <!-- Fonts + icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>

  <div class="app" id="app">
    <div class="topbar">
      <div id="topbar-content"></div>
    </div>
    <div class="content" id="content"></div>
    <nav class="nav">
      <button onclick="go('today')"     id="nb-today">    <i class="ti ti-sun"            aria-hidden="true"></i>Today</button>
      <button onclick="go('now')"       id="nb-now">      <i class="ti ti-player-play"    aria-hidden="true"></i>Now</button>
      <button onclick="go('plan')"      id="nb-plan">     <i class="ti ti-checklist"      aria-hidden="true"></i>Plan</button>
      <button onclick="go('tldr')"      id="nb-tldr">     <i class="ti ti-message-2"      aria-hidden="true"></i>TL;DR</button>
      <button onclick="go('reset')"     id="nb-reset">    <i class="ti ti-refresh"        aria-hidden="true"></i>Reset</button>
      <button onclick="go('diagnosis')" id="nb-diagnosis"><i class="ti ti-map"            aria-hidden="true"></i>Journey</button>
      <button onclick="go('me')"        id="nb-me">       <i class="ti ti-user"           aria-hidden="true"></i>Me</button>
    </nav>
  </div>

  <script type="module">
    import { go } from './src/app/router.js';
    import './src/features/splash/splash.js';
    import './src/features/today/today.js';
    import './src/features/now/now.js';
    import './src/features/plan/plan.js';
    import './src/features/tldr/tldr.js';
    import './src/features/reset/reset.js';
    import './src/features/diagnosis/diagnosis.js';
    import './src/features/me/me.js';

    window.go = go;
    go('splash');
  </script>
</body>
</html>
